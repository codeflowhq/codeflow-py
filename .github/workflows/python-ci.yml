name: Python CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - name: Sync dependencies
        run: uv sync --group dev
      - name: Ruff
        run: uv run ruff check src/code_visualizer tests      
      - name: Mypy
        run: uv run mypy src/code_visualizer
        run: uv build --wheel
